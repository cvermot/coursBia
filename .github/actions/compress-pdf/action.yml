name: 'Compress PDF with qpdf'
description: >
  Compresse un fichier PDF via qpdf (compression des flux objets) en
  préservant toutes les animations et contenus interactifs.

inputs:
  input:
    description: 'Chemin vers le fichier PDF source'
    required: true
  output:
    description: 'Chemin vers le fichier PDF compressé produit'
    required: true

runs:
  using: "composite"
  steps:
    - name: Installer qpdf
      shell: bash
      run: sudo apt-get install -y --no-install-recommends qpdf

    - name: Compresser le PDF
      shell: bash
      run: |
        echo "Compression : ${{ inputs.input }} → ${{ inputs.output }}"
        ls -lh "${{ inputs.input }}"
        qpdf --compress-streams=y --object-streams=generate --recompress-flate \
             --warning-exit-0 \
             "${{ inputs.input }}" "${{ inputs.output }}"
        echo "Résultat :"
        ls -lh "${{ inputs.output }}"
